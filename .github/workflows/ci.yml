name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  server:
    name: Server Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RL plugin
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build server test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          target: test
          push: false
          load: true
          tags: bunnyland-rl-server-test:ci
      - name: Run server tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-rl-server-test:ci
      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Summarize server test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          target: runtime
          push: false

  web:
    name: Web Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RL plugin
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          target: test
          push: false
          load: true
          tags: bunnyland-rl-web-test:ci
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
      - name: Run web tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-rl-web-test:ci
      - name: Upload web test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Summarize web test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: false
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
