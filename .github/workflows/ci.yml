name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  package:
    name: Artifact on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout RL plugin
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Build and test installed wheel
        run: |
          uv build --wheel --out-dir dist server
          uvx twine check dist/*.whl
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          uv venv "${{ runner.temp }}/artifact-test"
          uv pip install --python "${{ runner.temp }}/artifact-test/bin/python" \
            --index-url https://pypi.org/simple \
            --index pytorch-cpu=https://download.pytorch.org/whl/cpu \
            --index-strategy unsafe-best-match \
            "$wheel" "bunnyland[server]>=1,<2" "pytest>=8"
          "${{ runner.temp }}/artifact-test/bin/python" -c \
            'from importlib.metadata import entry_points, metadata; requirements = metadata("bunnyland-rl").get_all("Requires-Dist", []); assert any(item.startswith("bunnyland") and "<2" in item for item in requirements); assert any(item.startswith("relics-ecs") and "<0.2" in item for item in requirements); entry, = [item for item in entry_points(group="bunnyland.plugins") if item.name == "bunnyland.rl"]; assert entry.load()()'
          "${{ runner.temp }}/artifact-test/bin/python" -m pytest server/tests
          uvx ruff check server/src server/tests

  server:
    name: Server Plugin
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout RL plugin
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build server test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          target: test
          push: false
          load: true
          tags: bunnyland-rl-server-test:ci
      - name: Run server tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-rl-server-test:ci
      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Summarize server test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          target: runtime
          push: false

  web:
    name: Web Dashboard
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout RL plugin
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          target: test
          push: false
          load: true
          tags: bunnyland-rl-web-test:ci
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
      - name: Run web tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-rl-web-test:ci
      - name: Upload web test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Summarize web test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: false
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
